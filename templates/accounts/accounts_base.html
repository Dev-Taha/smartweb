{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid p-0">
    <div class="row g-0 auth-split-layout">
        <!-- Left Panel: Form -->
        <div class="col-md-6 auth-left-panel">
            <a href="/" class="auth-logo">
                <img src="{% static 'img/icon.png' %}" alt="SmartWeb Logo">
                SmartWeb
            </a>

            {% block auth_form %}
            {% endblock auth_form %}
        </div>

        <!-- Right Panel: Image/Branding -->
        <div class="col-md-6 d-none d-md-flex auth-right-panel position-relative justify-content-start pt-5">
            <div class="glass-card-wrapper mt-4 mx-auto mb-5">
                <div class="glass-card-inner">
                    <!-- Placeholder representing the UI mockup in the image -->
                    <div class="w-100 h-100 d-flex flex-column bg-white rounded" style="border: 2px solid #1e293b; overflow: hidden;">
                        <div class="d-flex w-100 px-3 py-2 border-bottom align-items-center">
                            <div class="bg-primary rounded me-3" style="width: 25%; height: 8px;"></div>
                            <div class="bg-secondary bg-opacity-25 rounded ms-auto" style="width: 15%; height: 8px;"></div>
                        </div>
                        <div class="row w-100 g-0 flex-grow-1">
                            <div class="col-4 border-end p-2 d-flex flex-column gap-2">
                                <div class="bg-primary rounded" style="width: 80%; height: 10px;"></div>
                                <div class="bg-secondary bg-opacity-25 rounded" style="width: 90%; height: 6px;"></div>
                                <div class="bg-secondary bg-opacity-25 rounded" style="width: 60%; height: 6px;"></div>
                                <div class="bg-secondary bg-opacity-25 rounded" style="width: 100%; height: 6px;"></div>
                            </div>
                            <div class="col-8 p-3 d-flex flex-column align-items-center">
                            <div class="rounded-circle bg-primary bg-opacity-10 d-flex align-items-center justify-content-center mb-3" style="width: 48px; height: 48px; border: 2px solid #0d6efd;">
                                <i class="bi bi-person text-primary" style="font-size: 1.5rem;"></i>
                                </div>
                                <div class="bg-secondary bg-opacity-50 rounded mb-2" style="width: 50%; height: 8px;"></div>
                                <div class="bg-secondary bg-opacity-25 rounded mb-2" style="width: 30%; height: 6px;"></div>
                                <div class="w-100 mt-2">
                                    <div class="bg-secondary bg-opacity-10 rounded mb-1" style="width: 100%; height: 6px;"></div>
                                    <div class="bg-secondary bg-opacity-10 rounded mb-1" style="width: 100%; height: 6px;"></div>
                                    <div class="bg-secondary bg-opacity-10 rounded mb-1" style="width: 80%; height: 6px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            {% block auth_right_panel %}
            {% endblock auth_right_panel %}
        </div>
    </div>
</div>
{% endblock content %}
